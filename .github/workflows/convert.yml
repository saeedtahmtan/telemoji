name: Convert TGS to WebP

on:
  push:
    branches: [main]
    paths:
      - 'tgs/**'
      - 'scripts/convert_tgs_to_webp.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          lfs: true

      - name: Install Git LFS
        run: git lfs install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install rlottie-python Pillow tqdm

      - name: Get changed TGS files
        id: changed
        run: |
          before="${{ github.event.before }}"
          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "First push — convert all new TGS files"
            echo "changed=" >> $GITHUB_OUTPUT
          else
            changed=$(git diff --name-only --diff-filter=AM "$before" "${{ github.sha }}" -- tgs/ | sed 's|^tgs/||' | tr '\n' ' ')
            echo "changed=$changed" >> $GITHUB_OUTPUT
          fi

      - name: Convert TGS to WebP
        run: |
          CHANGED="${{ steps.changed.outputs.changed }}"
          if [ -n "$CHANGED" ]; then
            echo "Converting changed files: $CHANGED"
            python scripts/convert_tgs_to_webp.py --quality 60 --method 4 --files $CHANGED
          else
            echo "No specific files detected — converting all with --skip-existing"
            python scripts/convert_tgs_to_webp.py --quality 60 --method 4 --skip-existing --jobs 1
          fi

      - name: Copy changed TGS to Lottie JSON
        run: |
          CHANGED="${{ steps.changed.outputs.changed }}"
          if [ -n "$CHANGED" ]; then
            echo "Copying changed files to lottie/: $CHANGED"
            python scripts/copy_tgs_to_lottie.py --files $CHANGED
          else
            echo "No specific files detected — copying all"
            python scripts/copy_tgs_to_lottie.py
          fi

      - name: Commit WebP and Lottie files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase
          git add webp/ lottie/ .gitattributes
          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            git commit -m "convert TGS to WebP (LFS) and sync Lottie JSON"
            git push
          fi
